services:

  mongodb:
    image: mongo:7
    container_name: sms-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: sms-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/smsproject
      - SECRET_KEY=secret123key

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: sms-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_BASE_URL=http://localhost:5000

volumes:
  mongo-data:
